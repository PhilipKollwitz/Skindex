name: Deploy to Firebase Hosting.

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

            
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

            
      - name: Install dependencies
        run: flutter pub get

            
      - name: Build web app
        run: flutter build web --release --no-wasm-dry-run --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}

            
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: skindex-97204

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project skindex-97204 --token ${{ secrets.FIREBASE_TOKEN }}
        working-directory: functions
